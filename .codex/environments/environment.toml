version = 1
name = "Crafting Table"

[setup]
script = ""

[[actions]]
name = "Launch iPad Simulator"
icon = "play"
command = "./scripts/launch-ipad-simulator.sh"

[[actions]]
name = "Launch Connected iPad"
icon = "play"
command = "./scripts/launch-ipad-device.sh"

[[actions]]
name = "Start Codex Remote Companion"
icon = "play"
command = "./scripts/codex-remote-companion.sh companion"

[[actions]]
name = "Start Codex Remote Companion LAN"
icon = "play"
command = "./scripts/codex-remote-companion.sh companion-lan"

[[actions]]
name = "Run Codex macOS Scout Snapshot"
icon = "play"
command = "./scripts/codex-remote-companion.sh scout"

[[actions]]
name = "Smoke Codex Remote Companion"
icon = "play"
command = "./scripts/codex-remote-companion.sh smoke"

[[actions]]
name = "Start Codex Host Runtime"
icon = "play"
command = "./scripts/codex-host-runtime.sh start"

[[actions]]
name = "Stop Codex Host Runtime"
icon = "stop"
command = "./scripts/codex-host-runtime.sh stop"

[[actions]]
name = "Status Codex Host Runtime"
icon = "terminal"
command = "./scripts/codex-host-runtime.sh status"
