version = 1
name = "Crafting Table"

[setup]
script = ""

[[actions]]
name = "Launch iPad Simulator"
icon = "play"
command = "./scripts/launch-ipad-simulator.sh"

[[actions]]
name = "Launch Connected iPad"
icon = "play"
command = "./scripts/launch-ipad-device.sh"

[[actions]]
name = "Run MacOS client"
icon = "play"
command = "./scripts/run-macos-client.sh"

[[actions]]
name = "Run Codex macOS Scout Snapshot"
icon = "play"
command = "./scripts/codex-remote-companion.sh scout"

[[actions]]
name = "Smoke Dev Codex Host Runtime"
icon = "play"
command = "./scripts/codex-host-runtime.sh smoke"

[[actions]]
name = "Start Dev Codex Host Runtime"
icon = "play"
command = "./scripts/codex-host-runtime.sh start"

[[actions]]
name = "Stop Dev Codex Host Runtime"
icon = "stop"
command = "./scripts/codex-host-runtime.sh stop"

[[actions]]
name = "Status Dev Codex Host Runtime"
icon = "terminal"
command = "./scripts/codex-host-runtime.sh status"
